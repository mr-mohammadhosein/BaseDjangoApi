services:
  db_postgres:
    profiles:
      - postgres
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-base_project_db}
      POSTGRES_USER: ${DB_USER:-base_project_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-strong_password_123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    init: true
    networks:
      - base-network

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    init: true
    networks:
      - base-network
    profiles:
      - redis
      - celery

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minio_admin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minio_password}
    command: server --console-address ":9001" /data
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    init: true
    networks:
      - base-network
    profiles:
      - minio

  setup-minio:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - .env
    command: python scripts/setup-minio.py
    networks:
      - base-network
    profiles:
      - minio

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - .:/app
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    restart: unless-stopped
    init: true
    networks:
      - base-network

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["dumb-init", "--", "scripts/entrypoint.sh"]
    command: celery -A config worker -l info
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "False"
      CREATE_SUPERUSER: "False"
      COLLECT_STATIC: "False"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      db_postgres:
        condition: service_healthy
    restart: unless-stopped
    init: true
    networks:
      - base-network
    profiles:
      - celery

networks:
  base-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
